<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scratch 2 Legacy</title>

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #ruffle {
            width: 100vw;
            height: 100vh;
        }
    </style>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</head>
<body>

<div id="ruffle"></div>

<script>
window.RufflePlayer = window.RufflePlayer || {};

window.addEventListener("load", async () => {
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();

    player.style.width = "100%";
    player.style.height = "100%";

    document.getElementById("ruffle").appendChild(player);

    try {
        const response = await fetch(
            "https://scratch2.cattymod.app/Scratch%202.0%20v461.swf"
        );

        if (!response.ok) {
            throw new Error("Failed to fetch SWF.");
        }

        const blob = await response.blob();
        const blobUrl = URL.createObjectURL(blob);

        await player.load(blobUrl);
        player.play();

        // Optional: free the blob after it's loaded
        player.addEventListener("load", () => {
            URL.revokeObjectURL(blobUrl);
        }, { once: true });

    } catch (err) {
        console.error(err);
        alert("Couldn't load the Scratch editor.");
    }
});

window.addEventListener("beforeunload", function (e) {
    e.preventDefault();
    e.returnValue = "Your project might not be saved.";
});
</script>

</body>
</html>
