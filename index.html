<!DOCTYPE HTML>
<html>
    <head>
        <meta charset='utf8'>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Scratch 2 Legacy</title>
        <link rel="icon" href="favicon.ico" type="image/x-icon">

        <style>
            /* Remove all default spacing + prevent scroll */
            html, body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
            }

            /* Make sure container fully fills screen */
            #ruffle {
                width: 100vw;
                height: 100vh;
                overflow: hidden;
            }
        </style>
    </head>

    <body>
        <div id="ruffle"></div>

        <script>
            window.RufflePlayer = window.RufflePlayer || {};

            window.addEventListener("DOMContentLoaded", () => {
                let ruffle = window.RufflePlayer.newest();
                let player = ruffle.createPlayer();

                document.getElementById("ruffle").appendChild(player);

                player.style.width = "100%";
                player.style.height = "100%";

                player.load("https://scratch2.cattymod.app/Scratch%202.0%20v461.swf");

                player.addEventListener("load", () => {
                    player.play();
                });
            });

            window.addEventListener("beforeunload", function (e) {
                e.preventDefault();
                e.returnValue = "Your project might not be saved.";
            });
        </script>

        <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    </body>
</html>
