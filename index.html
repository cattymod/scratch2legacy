<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Scratch 2 Legacy</title>

    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#2b2b2b">

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #2b2b2b;
        }

        #ruffle {
            width: 100vw;
            height: 100vh;
        }
    </style>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</head>

<body>

<div id="ruffle"></div>

<script>
window.addEventListener("load", async () => {

    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();

    player.style.width = "100%";
    player.style.height = "100%";

    document.getElementById("ruffle").appendChild(player);

    try {
        const res = await fetch("https://scratch2.cattymod.app/Scratch%202.0%20v461.swf");
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);

        await player.load(url);
        player.play();

    } catch (e) {
        console.error("Failed to load SWF:", e);
        alert("Scratch 2 failed to load.");
    }
});

if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js");
}
</script>

</body>
</html>
